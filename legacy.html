<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EndoFile Risk LEGACY</title>

<style>
/* CSS simplificado para navegadores antiguos */
body { 
    font-family: Helvetica, Arial, sans-serif; 
    margin: 0; background: #f8f9fa; color: #2c3e50; line-height: 1.4;
}

header { 
    background: #2c3e50; color: white; padding: 12px; text-align: center; 
    font-weight: bold; font-size: 1.1rem;
}

.container { padding: 10px; max-width: 400px; margin: auto; }

.card-panel {
    background: #ffffff; padding: 12px; border-radius: 8px;
    border: 1px solid #ddd; margin-bottom: 12px;
}

h3 { margin-top: 0; font-size: 0.7rem; text-transform: uppercase; color: #7f8c8d; }

.control { margin-bottom: 12px; }
label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 0.85rem; overflow: hidden; }
.val-badge { float: right; background: #edf2f7; padding: 1px 5px; border-radius: 4px; color: #3498db; }

input[type="range"] { width: 100%; margin: 8px 0; }

button { 
    display: block; width: 100%; border: none; padding: 12px; 
    border-radius: 8px; font-weight: bold; cursor: pointer; 
    font-size: 0.85rem; margin-bottom: 8px;
}

#btn-toggle { background: #3498db; color: white; }
.btn-secondary { background: #ecf0f1; color: #2c3e50; }
.btn-save { background: #27ae60; color: white; }

#res { 
    padding: 15px; border-radius: 12px; color: white; text-align: center; 
    margin: 12px 0; background: #27ae60;
}

.rul-big { font-size: 2.8rem; font-weight: bold; display: block; }
.status-text { font-weight: bold; text-transform: uppercase; font-size: 0.75rem; }

.dashboard { overflow: hidden; font-size: 0.8rem; }
.dash-item { float: left; width: 45%; background: #f8f9fa; padding: 8px; border-radius: 6px; text-align: center; margin: 2%; }

.historial { max-height: 180px; overflow-y: auto; font-size: 0.7rem; border-top: 1px solid #eee; padding-top: 8px; }
.hist-row { padding: 6px 0; border-bottom: 1px solid #f1f1f1; }
.hist-main { font-weight: bold; margin-bottom: 2px; }
.hist-sub { color: #7f8c8d; font-size: 0.6rem; }

footer { text-align: center; font-size: 0.65rem; color: #95a5a6; padding: 20px 10px; }
</style>
</head>

<body>

<header>🦷 EndoFile Risk v1.0 (Legacy)</header>

<div class="container">

    <div class="card-panel">
        <h3>Configuración</h3>
        
        <div class="control">
            <label>Diámetro ISO <span class="val-badge" id="d_val">0.10</span></label>
            <input type="range" id="d" min="0.10" max="0.40" step="0.01" value="0.10" oninput="calc()">
        </div>

        <div class="control">
            <label>Conicidad <span class="val-badge" id="c_val">0.02</span></label>
            <input type="range" id="c" min="0.02" max="0.10" step="0.01" value="0.02" oninput="calc()">
        </div>

        <div class="control">
            <label>Curvatura <span class="val-badge" id="curv_val">Leve</span></label>
            <input type="range" id="curv" min="1" max="3" value="1" oninput="calc()">
        </div>

        <div class="control">
            <label>Torque (Ncm) <span class="val-badge" id="torque_val">1.0</span></label>
            <input type="range" id="torque" min="1" max="5" step="0.1" value="1.0" oninput="calc()">
        </div>

        <div class="control">
            <label>Tiempo (seg) <span class="val-badge" id="t_val">0</span></label>
            <input type="range" id="t" min="0" max="120" value="0" oninput="setManualTime()">
        </div>

        <button id="btn-toggle" onclick="toggleTimer()">▶ INICIAR CRONÓMETRO</button>
        <button class="btn-secondary" onclick="reset()">🔄 REINICIAR</button>
    </div>

    <div id="res">
        <span class="status-text" id="status_label">LISTO</span>
        <span class="rul-big" id="rul_val">10</span>
        <span style="font-size: 0.7rem;">USOS RESTANTES</span>
        <div id="score_mini" style="font-size: 0.6rem; margin-top: 5px;">Índice de Fatiga: 0.0%</div>
    </div>

    <button class="btn-save" onclick="guardarCaso()">💾 GUARDAR CICLO</button>

    <div class="card-panel">
        <h3>Estadísticas</h3>
        <div class="dashboard" id="dashboard"></div>
    </div>

    <div class="card-panel">
        <h3>Registro</h3>
        <div class="historial" id="historial"></div>
        <button style="background:none; color:#3498db; width:100%; font-size:0.6rem; margin-top:10px;" onclick="exportarCSV()">DESCARGAR CSV</button>
        <button style="background:none; color:#e74c3c; width:100%; font-size:0.6rem; margin-top:5px;" onclick="borrarHistorial()">BORRAR TODO</button>
    </div>

    <footer>
        © 2026 Desarrollado por Christian Nole<br>
        Optimizado para iPad mini 1 (M-Wire RISING)
    </footer>

</div>

<script>
// JavaScript compatible con ES5 (iOS 9)
var db;
var request = indexedDB.open("EndoLegacyDB", 1);

request.onupgradeneeded = function(e) {
    db = e.target.result;
    db.createObjectStore("casos", { keyPath: "id", autoIncrement: true });
};

request.onsuccess = function(e) {
    db = e.target.result;
    cargarHistorial();
};

var tiempo = 0;
var running = false;
var lastTime = 0;

var d = document.getElementById("d");
var c = document.getElementById("c");
var curv = document.getElementById("curv");
var t = document.getElementById("t");
var torque = document.getElementById("torque");
var btnToggle = document.getElementById("btn-toggle");

function getCurv(v) {
    if(v == 1) return { f: 1.0, txt: "Leve" };
    if(v == 2) return { f: 1.5, txt: "Moderada" };
    return { f: 2.2, txt: "Severa" };
}

function calc() {
    var dv = parseFloat(d.value);
    var cv = parseFloat(c.value);
    var tv = parseFloat(torque.value);
    var cur = getCurv(parseInt(curv.value));

    document.getElementById("d_val").innerHTML = dv.toFixed(2);
    document.getElementById("c_val").innerHTML = cv.toFixed(2);
    document.getElementById("torque_val").innerHTML = tv.toFixed(1);
    document.getElementById("t_val").innerHTML = tiempo;
    document.getElementById("curv_val").innerHTML = cur.txt;
    
    t.value = tiempo;

    var T_val = Math.pow(tiempo / 60, 1.3);
    var Tor_val = tv / 5;
    var G_val = ((dv - 0.20) / 0.20 + (cv - 0.02) / 0.08) / 2;
    
    var score = 100 * (0.45 * T_val + 0.30 * Tor_val + 0.25 * G_val);
    score = score * cur.f;
    if (score > 100) score = 100;

    var rul = Math.floor((100 - score) / 10);
    var estado = "REUTILIZABLE";
    var color = "#27ae60";
    
    if(rul < 6) { estado = "PRECAUCIÓN"; color = "#f39c12"; }
    if(rul < 3) { estado = "ÚLTIMO USO"; color = "#e67e22"; }
    if(rul < 1) { estado = "DESCARTAR"; color = "#2c3e50"; rul = 0; }

    document.getElementById("res").style.backgroundColor = color;
    document.getElementById("rul_val").innerHTML = rul;
    document.getElementById("status_label").innerHTML = estado;
    document.getElementById("score_mini").innerHTML = "Índice de Fatiga: " + score.toFixed(1) + "%";

    return { score: score, rul: rul, estado: estado };
}

function loop() {
    if (!running) return;
    var now = Date.now();
    if (now - lastTime >= 1000) {
        tiempo++;
        calc();
        lastTime = now;
    }
    setTimeout(loop, 100); // Usamos setTimeout para mejor estabilidad en iOS 9
}

function toggleTimer() {
    if (!running) {
        running = true;
        btnToggle.innerHTML = "⏸ PAUSAR";
        btnToggle.style.backgroundColor = "#e74c3c";
        lastTime = Date.now();
        loop();
    } else {
        running = false;
        btnToggle.innerHTML = "▶ REANUDAR";
        btnToggle.style.backgroundColor = "#3498db";
    }
}

function setManualTime() {
    tiempo = parseInt(t.value);
    calc();
}

function reset() {
    running = false;
    tiempo = 0;
    d.value = 0.10; c.value = 0.02; curv.value = 1; t.value = 0; torque.value = 1.0;
    btnToggle.innerHTML = "▶ INICIAR";
    btnToggle.style.backgroundColor = "#3498db";
    calc();
}

function guardarCaso() {
    var data = calc();
    var tx = db.transaction("casos", "readwrite");
    var store = tx.objectStore("casos");
    store.add({
        fecha: new Date().toLocaleString(),
        tiempo: tiempo, 
        diametro: d.value, 
        conicidad: c.value, 
        score: data.score, 
        rul: data.rul, 
        estado: data.estado
    });
    tx.oncomplete = function() { cargarHistorial(); };
}

function cargarHistorial() {
    var tx = db.transaction("casos", "readonly");
    var store = tx.objectStore("casos");
    var req = store.getAll();
    req.onsuccess = function() {
        var data = req.result;
        var html = "";
        var sumaScore = 0;
        
        for (var i = data.length - 1; i >= 0; i--) {
            var item = data[i];
            sumaScore += item.score;
            html += '<div class="hist-row"><div class="hist-main">' +
                    '<span>Lima ' + item.diametro + '/' + item.conicidad + '</span>' +
                    '<span style="float:right">Restan: ' + item.rul + '</span></div>' +
                    '<div class="hist-sub">' + item.fecha + ' | ' + item.estado + '</div></div>';
        }
        
        document.getElementById("historial").innerHTML = html || "Sin registros";
        
        var promedio = data.length ? (sumaScore / data.length).toFixed(1) : 0;
        document.getElementById("dashboard").innerHTML = 
            '<div class="dash-item"><strong>' + data.length + '</strong><br>Ciclos</div>' +
            '<div class="dash-item"><strong>' + promedio + '%</strong><br>Fatiga Prom.</div>';
    };
}

function borrarHistorial() {
    if (confirm("¿Borrar todo?")) {
        var tx = db.transaction("casos", "readwrite");
        tx.objectStore("casos").clear();
        tx.oncomplete = function() { cargarHistorial(); };
    }
}

function exportarCSV() {
    var tx = db.transaction("casos", "readonly");
    var store = tx.objectStore("casos");
    var req = store.getAll();
    req.onsuccess = function() {
        var data = req.result;
        var csv = "tipo_lima,usos_restantes,fatiga\n";
        for (var i = 0; i < data.length; i++) {
            var item = data[i];
            csv += item.diametro + "/" + item.conicidad + "," + item.rul + "," + item.score.toFixed(1) + "%\n";
        }
        var blob = new Blob([csv], { type: "text/csv;charset=utf-8" });
        var url = window.URL.createObjectURL(blob);
        var a = document.createElement("a");
        a.href = url;
        a.download = "EndoLegacy_Data.csv";
        a.click();
    };
}

calc();
</script>

</body>
</html>
